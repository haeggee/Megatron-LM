title: "Baseline vs ngpt vs Spherical Adam"
subplots:
  - title: "Baseline vs Master A0 vs. nPre vs. nFin vs flat"
    x_label: "Learning Rate"
    x_param: lr
    series:
      - label: "Baseline (Llama + WSD + AdamW)"
        default_x_value: 0.002
        runs:
          - "110M-n1"
          - "110M-lr0.004-n1"
          - "110M-lr0.001-n1"

      - label: "baseline with spherical Adam"
        default_x_value: 0.002
        runs:
          - "110M1-master_h_a0-wd0-HSembed1_l2_it0_emb-lr0.004-elr-std0.044-nw-cos-n2"
          - "110M1-master_h_a0-wd0-HSembed1_l2_it0_emb-lr0.002-elr-std0.044-nw-cos-n2"
          - "110M1-master_h_a0-wd0-HSembed1_l2_it0_emb-lr0.003-elr-std0.044-nw-cos-n2"
          - "110M1-master_h_a0-wd0-HSembed1_l2_it0_emb-lr0.004-elr-std0.044-nw-cos-n2"
          - "110M1-master_h_a0-wd0-HSembed1_l2_it0_emb-lr0.005-elr-std0.044-nw-cos-n2"

      - label: "Master A0"
        default_x_value: 0.002
        runs:
